# Monorepo pre-commit config (repo root).
# Django hooks are scoped to backend/; repo-wide hooks (whitespace, yaml, keys)
# run everywhere except the backend Sphinx docs and migrations.
exclude: '^backend/docs/|/migrations/|devcontainer.json'
default_stages: [pre-commit]
minimum_pre_commit_version: "3.2.0"

default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: check-yaml
      - id: debug-statements
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-docstring-first
      - id: detect-private-key

  - repo: https://github.com/adamchainz/django-upgrade
    rev: '1.30.0'
    hooks:
      - id: django-upgrade
        args: ['--target-version', '6.0']
        files: ^backend/

  # Run the Ruff linter.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      # Linter
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
        files: ^backend/
      # Formatter
      - id: ruff-format
        files: ^backend/

  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: v2.24.1
    hooks:
      - id: pyproject-fmt
        files: '^backend/pyproject\.toml$'

  - repo: https://github.com/djlint/djLint
    rev: v1.39.2
    hooks:
      - id: djlint-reformat-django
        files: ^backend/
      - id: djlint-django
        files: ^backend/

  # Local hooks (repo-wide tooling).
  - repo: local
    hooks:
      - id: validate-stride
        name: Validate STRIDE YAML
        entry: python scripts/validate_stride.py
        language: python
        language_version: python3
        additional_dependencies: ["pyyaml>=6"]
        files: '^docs/threat-model/stride/.*\.ya?ml$'
        pass_filenames: true

# sets up .pre-commit-ci.yaml to ensure pre-commit dependencies stay up to date
ci:
  autoupdate_schedule: weekly
  skip: []
  submodules: false
