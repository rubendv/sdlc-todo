volumes:
  todo_local_postgres_data: {}
  todo_local_postgres_data_backups: {}


services:
  django:
    build:
      context: ./backend
      dockerfile: ./compose/local/django/Dockerfile
    image: todo_local_django
    container_name: todo_local_django
    depends_on:
      - postgres
      - mailpit
    volumes:
      - /app/.venv
      - ./backend:/app:z
    env_file:
      - ./backend/.envs/.local/.django
      - ./backend/.envs/.local/.postgres
    ports:
      - '8000:8000'
    command: /start

  postgres:
    build:
      context: ./backend
      dockerfile: ./compose/production/postgres/Dockerfile
    image: todo_production_postgres
    container_name: todo_local_postgres
    volumes:
      - todo_local_postgres_data:/var/lib/postgresql/18/docker
      - todo_local_postgres_data_backups:/backups
    env_file:
      - ./backend/.envs/.local/.postgres

  mailpit:
    image: docker.io/axllent/mailpit:latest
    container_name: todo_local_mailpit
    ports:
      - "8025:8025"
